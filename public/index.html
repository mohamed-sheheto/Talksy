<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talksy</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-container">
        <h1>TalkSee</h1>

        <div id="loginForm" class="form-container active">
          <h2>Login</h2>
          <div id="loginError" class="error-message"></div>
          <form id="loginFormElement">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" name="email" required />
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input
                type="password"
                id="loginPassword"
                name="password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <p class="form-switch">
            Don't have an account?
            <a href="#" id="showSignup">Sign up</a>
          </p>
          <div class="divider">
            <span>OR</span>
          </div>
          <button class="btn btn-google" id="googleLogin">
            <span>🔐</span> Continue with Google
          </button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container">
          <h2>Sign Up</h2>
          <div id="signupError" class="error-message"></div>
          <form id="signupFormElement">
            <div class="form-group">
              <label for="signupUsername">Username</label>
              <input
                type="text"
                id="signupUsername"
                name="username"
                required
                minlength="3"
                maxlength="20"
              />
              <small>3-20 characters</small>
            </div>
            <div class="form-group">
              <label for="signupEmail">Email</label>
              <input type="email" id="signupEmail" name="email" required />
            </div>
            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input
                type="password"
                id="signupPassword"
                name="password"
                required
                minlength="8"
              />
              <small
                >At least 8 characters with uppercase, lowercase, and
                number</small
              >
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>
          <p class="form-switch">
            Already have an account?
            <a href="#" id="showLogin">Login</a>
          </p>
        </div>
      </div>
      <!-- /.auth-container -->
    </div>
    <!-- /.container -->

    <!-- Chat App (shown after login) -->
    <div id="chatApp" class="chat-container hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h3>Rooms</h3>
          <button id="createRoomBtn" class="btn btn-secondary small">
            + New
          </button>
        </div>
        <ul id="roomsList" class="rooms-list">
          <li class="room active" data-room="General"># General</li>
          <li class="room" data-room="Random"># Random</li>
        </ul>
        <div class="sidebar-footer">
          <div class="user-mini">
            <div class="avatar">U</div>
            <div class="user-meta">
              <strong id="userName">User</strong>
              <button class="btn btn-secondary tiny" id="logoutBtn">
                Logout
              </button>
            </div>
          </div>
        </div>
      </aside>

      <main class="chat-main">
        <div class="chat-header">
          <h4 id="roomTitle"># General</h4>
        </div>

        <div id="messagesList" class="messages-list"></div>

        <form id="messageForm" class="message-form">
          <input
            id="messageInput"
            name="message"
            autocomplete="off"
            placeholder="Message #General"
          />
          <button id="sendBtn" class="btn btn-primary" type="submit">
            Send
          </button>
        </form>
      </main>

      <aside class="right-panel">
        <div id="typingIndicator" class="typing-indicator"></div>
        <h4>Members</h4>
        <ul id="membersList" class="members-list"></ul>
      </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="socket.js"></script>
    <script src="script.js"></script>
  </body>
</html>
